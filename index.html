<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Análise INSS</title>

<style>
body {
  font-family: Arial;
  background: #0b1220;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: #121a2f;
  padding: 30px;
  border-radius: 12px;
  width: 350px;
  text-align: center;
}

button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #facc15;
  cursor: pointer;
  font-weight: bold;
}

.hidden { display: none; }
</style>
</head>

<body>

<div class="box">

<div id="q1">
<h2>Você já deu entrada no INSS?</h2>
<button onclick="next('Sim')">Sim</button>
<button onclick="next('Não')">Não</button>
</div>

<div id="q2" class="hidden">
<h2>Qual sua situação?</h2>
<button onclick="next('Benefício negado')">Benefício negado</button>
<button onclick="next('Em análise')">Em análise</button>
<button onclick="next('Acidente de trabalho')">Acidente de trabalho</button>
</div>

<div id="q3" class="hidden">
<h2>Você possui laudo ou sequela?</h2>
<button onclick="finish('Sim')">Sim</button>
<button onclick="finish('Não')">Não</button>
</div>

<div id="final" class="hidden">
<h2>Pronto! Agora fale com um especialista</h2>
<a id="wpp" target="_blank">
<button>Falar no WhatsApp</button>
</a>
</div>

</div>

<script>
let respostas = [];

function next(resposta) {
  respostas.push(resposta);
  
  if(respostas.length === 1){
    document.getElementById('q1').classList.add('hidden');
    document.getElementById('q2').classList.remove('hidden');
  }
  
  else if(respostas.length === 2){
    document.getElementById('q2').classList.add('hidden');
    document.getElementById('q3').classList.remove('hidden');
  }
}

function finish(resposta) {
  respostas.push(resposta);

  let texto = "Olá, quero verificar meu caso do INSS:\n";
  texto += "Entrada no INSS: " + respostas[0] + "\n";
  texto += "Situação: " + respostas[1] + "\n";
  texto += "Laudo/Sequela: " + respostas[2];

  let url = "https://wa.me/55SEUNUMERO?text=" + encodeURIComponent(texto);

  document.getElementById('q3').classList.add('hidden');
  document.getElementById('final').classList.remove('hidden');
  document.getElementById('wpp').href = url;
}
</script>

</body>
</html>
