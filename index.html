<body>
  <!-- (mantive TODO seu HTML exatamente igual) -->

<script>
const number = '5547992695929';

const qs = [
  {k:'Benefício',q:'Qual situação mais parece com a sua?',o:['Auxílio-doença negado ou parado','Acidente com sequela ou limitação','Aposentadoria negada, atrasada ou com dúvida','Ainda não sei qual benefício pedir']},
  {k:'Pedido no INSS',q:'Você já fez algum pedido no INSS?',o:['Sim, e foi negado','Sim, ainda está em análise','Ainda não fiz o pedido','Já recebo, mas tenho dúvida no valor']},
  {k:'Documentos',q:'Você possui documentos do seu caso?',o:['Tenho laudos, exames ou atestados','Tenho carta de indeferimento do INSS','Tenho alguns documentos','Ainda não tenho documentos']},
  {k:'Urgência',q:'O que você mais precisa agora?',o:['Saber se ainda tenho direito','Recorrer de uma negativa','Dar entrada do jeito certo','Conferir aposentadoria ou valores']}
];

let step = 0;
let ans = {};

function startQuiz(){
  document.getElementById('start').style.display='none';
  document.getElementById('quiz').style.display='block';
  render();
}

function render(){
  const q = qs[step];
  let html = `<div class="q-title">${q.q}</div><div class="options">`;

  q.o.forEach(opt => {
    html += `<button class="option ${ans[q.k] === opt ? 'selected' : ''}" onclick="select('${q.k}', '${opt.replace(/'/g, "\\'")}')">${opt}</button>`;
  });

  html += `</div>`;
  document.getElementById('qbox').innerHTML = html;

  const pct = Math.round(((step + 1) / qs.length) * 100);
  document.getElementById('bar').style.width = pct + '%';
  document.getElementById('stepText').innerText = `Pergunta ${step + 1} de ${qs.length}`;
  document.getElementById('percentText').innerText = pct + '%';
}

function select(k,v){ ans[k] = v; render(); }

function next(){
  if(!ans[qs[step].k]) return;
  if(step < qs.length - 1){ step++; render(); }
  else show();
}

function back(){
  if(step > 0){ step--; render(); }
}

function show(){
  document.getElementById('quiz').style.display='none';
  document.getElementById('result').style.display='block';
  let txt = '<strong>Resumo enviado para análise:</strong><br><br>';
  Object.keys(ans).forEach(k => { txt += `<strong>${k}:</strong> ${ans[k]}<br>`; });
  document.getElementById('summary').innerHTML = txt;
}

function send(){
  let msg = 'Olá, acabei de preencher a análise sobre meu caso no INSS.%0A%0A';
  Object.keys(ans).forEach(k => { msg += `${k}: ${ans[k]}%0A`; });
  msg += '%0APode me orientar sobre o próximo passo?';
  window.location.href = `https://wa.me/${number}?text=${msg}`;
}
</script>
